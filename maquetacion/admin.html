<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUTAPP - Panel Administrador</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="admin-layout">

        <div class="admin-menu">
            <img src="img/logo.png" alt="Logo RUTAPP" class="logo">
            <h2>Panel Administrador</h2>

            <ul>
                <li>Dashboard</li>
                <li>Usuarios</li>
                <li>Rutas</li>
                <li>Ubicación en tiempo real</li>
                <li>Cerrar sesión</li>
            </ul>
        </div>

        <div class="admin-content">
            <h2>Bienvenido</h2>
            <p>Desde este panel podrá gestionar la información del sistema RUTAPP.</p>

            <img src="img/mapa.png" alt="Mapa de rutas en tiempo real" class="mapa-admin">

            <div class="admin-buttons">
                <button>Gestionar Usuarios</button>
                <button>Gestionar Rutas</button>
                <button>Gestionar Vehículos</button>
            </div>

        </div>

    </div>

</body>
</html>
