<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUTAPP - Panel Conductor</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="conductor-layout">

        <div class="conductor-menu">
            <img src="img/logo.png" alt="Logo RUTAPP" class="logo">
            <h2>Panel Conductor</h2>

            <ul>
                <li>Dashboard</li>
                <li>Mi Ruta</li>
                <li>Ubicación en tiempo real</li>
                <li>Estudiantes</li>
                <li>Alertas</li>
                <li>Cerrar Sesión</li>
            </ul>
        </div>

        <div class="conductor-content">
            <h2>Bienvenido</h2>
            <p>Visualice el recorrido y gestione las alertas para los padres de familia.</p>

                <img src="img/mapa.png" alt="Mapa de rutas en tiempo real" class="mapa">

            <div class="conductor-buttons">
                <button>Compartir Ubicación</button>
                <button>Ejecutar Ruta</button>
                <button>Gestionar Estudiantes</button>
                <button>Generar Alertas</button>
            </div>

        </div>
    </div>

</body>
</html>
