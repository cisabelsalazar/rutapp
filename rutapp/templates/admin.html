<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUTAPP - Panel Administrador</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>

<body>

    <div class="admin-layout">

        <div class="admin-menu">
            <img
                src="{{ url_for('static', filename='img/logo.png') }}"
                alt="Logo RUTAPP"
                class="logo"
            >

            <h2>Panel Administrador</h2>

            <ul>
                <li>Dashboard</li>
                <li>Usuarios</li>
                <li>Rutas</li>
                <li>Ubicación en tiempo real</li>
                <a href="{{ url_for('logout') }}" class="btn-logout">Cerrar sesión</a>
            </ul>
        </div>

        <div class="admin-content">
            <h2>Bienvenido</h2>
            <p>Desde este panel podrá gestionar la información del sistema RUTAPP.</p>

            <img 
                src="{{ url_for('static', filename='img/mapa.png') }}"
                alt="Mapa de rutas en tiempo real" 
                class="mapa-admin"
            >

            <div class="admin-buttons">
                <a href="{{ url_for('usuarios') }}" class="btn">Gestionar usuarios</a>
                <a href="{{ url_for('vehiculos') }}" class="btn">Gestionar vehículos</a>
                <a href="{{ url_for('rutas') }}" class="btn">Gestionar rutas</a>
                <a href="{{ url_for('generar_alerta') }}" class="btn">Generar alertas</a>
                <a href="{{ url_for('recibir_alertas') }}" class="btn">Recibir alertas</a>
                <a href="{{ url_for('monitorear_ruta') }}" class="btn">Monitorear ruta</a>
            </div>

        </div>

    </div>

</body>
</html>
