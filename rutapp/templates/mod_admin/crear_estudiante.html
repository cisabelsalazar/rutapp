<!-- ===== FORMULARIO CREAR ESTUDIANTE ===== -->

<!DOCTYPE html>
<html>

<head>
    <title>Crear Estudiante</title>
    <link rel="stylesheet" href="{{url_for('static', filename='css/styles.css') }}">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='img/logo.ico') }}">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='img/logo.ico') }}">
</head>

<body class="bg-secundario">

    <header>
        {# Incluye el encabezado (header) de la página #}
        {% include 'layout/header.html' %}

    </header>

    <main>

        <img src="{{ url_for('static', filename='img/imagen_login.png') }}" alt="Imagen de fondo Login"
            class="Imagen" />
        <div class="admin-layout">

            <div class="admin-menu">
                <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo RUTAPP" class="logo">

                <h2>Panel Superadministrador</h2>

                <ul>
                    <li>Dashboard</li>
                    <li>Usuarios</li>
                    <li>Rutas</li>
                    <li>Ubicación en tiempo real</li>
                    <li>
                        <a href="{{ url_for('logout') }}" class="btn-logout">
                            Cerrar sesión
                        </a>
                    </li>
                </ul>
            </div>

            <form class="form-crear_estudiante" 
                  action="{{ url_for('guardar_estudiante') }}" 
                  method="POST">

                <h1>Crear estudiante</h1>

                <div class="form-group">
                    <label>Id estudiante:</label>
                    <input type="text" name="id_estudiante" required>
                </div>

                <div class="form-group">
                    <label>Nombre:</label>
                    <input type="text" name="nombre" required>
                </div>

                <div class="form-group">
                    <label>Grado:</label>
                    <input type="text" name="grado" required>
                </div>

                <div class="form-group">
                    <label>Dirección:</label>
                    <input type="text" name="direccion" required>
                </div>

                <div class="form-group">
                    <label>Teléfono:</label>
                    <input type="text" name="telefono" required>
                </div>

                <div class="form-group">
                    <label>Id ruta:</label>
                    <input type="text" name="id_ruta">
                </div>

                <button type="submit" class="btn btn-guardar">Guardar</button>
                <a href="{{ url_for('gestion_estudiantes') }}" class="btn btn-volver">
                    Volver
                </a>
            </form>

            </form>
            <footer class="footer">
                {# ===== FOOTER ===== #}
                {% include 'layout/footer.html' %}
            </footer>
        </div>
    </main>
</body>

</html>
