<!-- ===== FORMULARIO CREAR USUARIO ===== -->

<!DOCTYPE html>
<html>

<head>
    <title>Crear usuario</title>
    <link rel="stylesheet" href="{{url_for('static', filename='css/styles.css') }}">
</head>

<body class="bg-secundario">

    <header>
        {# Incluye el encabezado (header) de la página #}
        {% include 'layout/header.html' %}

    </header>

    <main>

        <img src="{{ url_for('static', filename='img/imagen_login.png') }}" alt="Imagen de fondo Login"
            class="Imagen" />


        <form class="form-crear_usuarios" action="/guardar_usuario" method="POST">

            <h1>Crear nuevo usuario</h1>

            <div class="form-group">
                <label>Cédula:</label>
                <input type="text" name="id_usuario" required>
            </div>

            <div class="form-group">
                <label>Nombre de usuario:</label> <!-- Campo para nombre de usuario -->
                <input type="text" name="nombre_usuario" required>
            </div>

            <div class="form-group">
                <label>Nombre completo:</label>
                <input type="text" name="nombres_y_apellidos" required>
            </div>

            <div class="form-group">
                <label>Correo:</label>
                <input type="email" name="correo" required>
            </div>

            <div class="form-group">
                <label>Teléfono:</label>
                <input type="text" name="telefono" required>
            </div>

            <div class="form-group">
                <label>Contraseña:</label>
                <input type="password" name="password" required>
            </div>

            <div class="form-group">
                <label>Rol:</label>
                <select name="rol">
                    <option value="1">Superadministrador</option>
                    <option value="2">Administrador</option>
                    <option value="3">Conductor</option>
                    <option value="4">Padre de familia</option>
                </select>
            </div>

            <button type="submit" class="btn btn-guardar">Guardar</button>
            <a href="{{ url_for('usuarios') }}" class="btn btn-volver">Volver</a>
            </a>

        </form>
        <footer class="footer">
            {# ===== FOOTER ===== #}
            {% include 'layout/footer.html' %}
        </footer>
    </main>
</body>

</html>
