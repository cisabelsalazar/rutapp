<!-- ===== FORMULARIO EDITAR USUARIO ===== -->

<!DOCTYPE html>
<html>

<head>
    <title>Editar usuario</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>

<body class="bg-secundario">

    <header>
        {# Incluye el encabezado (header) de la página #}
        {% include 'layout/header.html' %}
    </header>

    <main>
        <img src="{{ url_for('static', filename='img/imagen_login.png') }}" alt="Imagen de fondo Login"
            class="Imagen" />


        <form id="formEditarUsuario" class="form-editar_usuario"
            action="{{ url_for('editar_usuario', id_usuario=usuario.id_usuario) }}" method="POST">

            <h1>Editar usuario</h1>

            <div class="form-group">
                <label>Cédula:</label>
                <input type="text" name="id_usuario" value="{{ usuario.id_usuario }}" readonly>
            </div>

            <div class="form-group">
                <label>Nombre de usuario:</label>
                <input type="text" name="nombre_usuario" value="{{ usuario.nombre_usuario }}" required>
            </div>

            <div class="form-group">
                <label>Nombre completo:</label>
                <input type="text" name="nombres_y_apellidos" value="{{ usuario.nombres_y_apellidos }}" required>
            </div>

            <div class="form-group">
                <label>Correo:</label>
                <input type="email" name="correo" value="{{ usuario.correo }}" required>
            </div>

            <div class="form-group">
                <label>Teléfono:</label>
                <input type="text" name="telefono" value="{{ usuario.telefono }}" required>
            </div>

            <div class="form-group">
                <label>Rol:</label>
                <select name="rol" required>
                    <option value="1" {% if usuario.rol==1 %}selected{% endif %}>Superadministrador</option>
                    <option value="2" {% if usuario.rol==2 %}selected{% endif %}>Administrador</option>
                    <option value="3" {% if usuario.rol==3 %}selected{% endif %}>Conductor</option>
                    <option value="4" {% if usuario.rol==4 %}selected{% endif %}>Padre de familia</option>
                </select>
            </div>

            <button type="button" class="btn btn-guardar" onclick="confirmarGuardado()">
                Guardar cambios
            </button>

            <a href="{{ url_for('usuarios') }}" class="btn btn-cabcelar">
                Cancelar
            </a>

        </form>
    </main>

    <footer class="footer">
        {% include 'layout/footer.html' %}
    </footer>

    <script>
        function confirmarGuardado() {
            Swal.fire({
                title: '¿Guardar cambios?',
                text: 'Se actualizará la información del usuario',
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'Sí, guardar',
                cancelButtonText: 'Cancelar',
                customClass: {
                    popup: 'swal-popup',
                    confirmButton: 'swal-confirm-btn',
                    cancelButton: 'swal-cancel-btn'
                }
            }).then((result) => {
                if (result.isConfirmed) {
                    document.getElementById('formEditarUsuario').submit();
                }
            });
        }
    </script>

</body>

</html>
