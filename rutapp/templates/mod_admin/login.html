<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUTAPP - Inicio de sesión</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>

<body class="bg-home">

    <header>
        {# Incluye el encabezado (header) de la página #}
        {% include 'layout/header.html' %}
    </header>

    <main>

        <img src="{{ url_for('static', filename='img/imagen_login.png') }}" alt="Imagen de fondo Login"
            class="Imagen" />

        <div class="login-container">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo RUTAPP" class="logo">

            <p>Bienvenido al sistema de gestión de rutas escolares</p>

            <h1>RUTAPP</h1>

            <form action="/validar_login" method="POST">

                <div class="form-group">
                    <label for="correo">Correo electrónico:</label>
                    <input type="email" id="correo" name="correo" placeholder="ejemplo@correo.com">
                </div>

                <div class="form-group">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" name="password" placeholder="**********">
                </div>

                <div class="form-actions">
                    <button type="submit">Iniciar sesión</button>
                    <a href="/recuperar-password" class="forgot-password">
                        ¿Olvidaste tu contraseña?
                    </a>
                </div>

            </form>


        </div>
        <footer class="footer">
            {# ===== FOOTER ===== #}
            {% include 'layout/footer.html' %}
        </footer>
    </main>

</body>

</html>
