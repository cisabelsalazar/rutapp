<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUTAPP - Reportar Inasistencia</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='img/logo.ico') }}">
</head>

<body class="padre_body bg-secundario vista-padres">

    <!-- ===== HEADER ===== -->
    <header>
        {% include 'layout/header.html' %}
    </header>

    <img src="{{ url_for('static', filename='img/imagen_padres.png') }}" alt="Imagen de fondo" class="Imagen" />

    <div class="padre-layout">

        <!-- ===== MENÚ PADRE ===== -->
        <aside class="padre-menu">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo RUTAPP" class="logo">

            <h2>Panel Padre</h2>

            <ul>
                <li><a href="{{ url_for('padres') }}">Dashboard</a></li>
                <li><a href="{{ url_for('ver_ruta') }}">Ver Ruta</a></li>
                <li><a href="{{ url_for('informacion_conductor') }}">Conductor</a></li>
                <li><a href="{{ url_for('reportar_inasistencia') }}">Inasistencia</a></li>
                <li>
                    <a href="{{ url_for('logout') }}" class="btn-logout">
                        Cerrar sesión
                    </a>
                </li>
            </ul>
        </aside>

        <!-- ===== FORMULARIO ===== -->
        <main class="main-content">
            <section class="cardr">


                <form method="POST" action="{{ url_for('reportar_inasistencia') }}" class="form-inasistencia">

                    <h1>Reportar Inasistencia</h1>

                    <div class="form-group">
                        <label for="estudiante">Estudiante</label>
                        <select id="estudiante" name="estudiante" required>
                            <option value="">Seleccione</option>
                            <option value="Juan Pérez">Juan Pérez</option>
                            <option value="Ana Torres">Ana Torres</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="fecha">Fecha de la inasistencia</label>
                        <input type="date" id="fecha" name="fecha" required>
                    </div>

                    <div class="form-group">
                        <label for="motivo">Motivo</label>
                        <select id="motivo" name="motivo" required>
                            <option value="">Seleccione</option>
                            <option value="enfermedad">Enfermedad</option>
                            <option value="cita_medica">Cita médica</option>
                            <option value="permiso_familiar">Permiso familiar</option>
                            <option value="otro">Otro</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="observacion">Observaciones</label>
                        <textarea id="observacion" name="observacion" rows="4"
                            placeholder="Escriba detalles importantes..."></textarea>
                    </div>

                    <div class="acciones-formulario">
                        <button type="submit" class="btn btn-guardar">
                            Enviar reporte
                        </button>

                        <a href="{{ url_for('padres') }}" class="btn btn-volver">
                            Cancelar
                        </a>
                    </div>

                </form>
            </section>
        </main>
    </div>

    <!-- ===== FOOTER ===== -->
    <footer class="footer">
        {% include 'layout/footer.html' %}
    </footer>

</body>

</html>
