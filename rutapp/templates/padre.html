<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUTAPP - Panel Padre de Familia</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <!-- Vista Padre de familia -->
    <div class="padre-layout">

        <div class="padre-menu">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo RUTAPP" class="logo">
            <h2>Panel Padre de Familia</h2>

            <ul>
                <li>Inicio</li>
                <li>Información del conductor</li>
                <li>Estudiantes</li>
                <li>Estado de la ruta</li>
                <li>Reportar inasistencia</li>
                <li>Cerrar sesión</li>
            </ul>
        </div>

        <div class="padre-content">
            <h2>Bienvenido</h2>
            <p>Consulte la información del conductor y el estado de la ruta escolar.</p>

            <img src="img/mapa.png" alt="Mapa de la ruta" class="mapa">

            <div class="padre-buttons">
                <button>Ver conductor</button>
                <button>Ver ruta</button>
                <button>Ver estudiantes</button>
                <button>Reportar inasistencia</button>
            </div>
        </div>

    </div>

</body>
</html>
